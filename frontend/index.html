<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✅ Minhas Tarefas</h1>

        <div id="login-section">
            <h2>Acessar Conta</h2>
            <input type="email" id="email" placeholder="Seu e-mail" required>
            <input type="password" id="password" placeholder="Sua senha" required>
            <button onclick="login()">Entrar</button>
        </div>

        <div id="todo-section" style="display: none;">
            <div class="add-task-form">
                <h3>Criar Nova Tarefa</h3>
                
                <input type="text" id="new-task-title" placeholder="O que você precisa fazer? (Obrigatório)" required>
                
                <textarea id="new-task-desc" placeholder="Detalhes ou descrição (Opcional)" rows="3"></textarea>
                
                <div class="date-input-group">
                    <label>Prazo (Opcional):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="new-task-date"> 
                        <input type="time" id="new-task-time"> 
                    </div>
                </div>
                
                <button onclick="createTask()">Adicionar Tarefa</button>
            </div>
            
            <ul id="task-list">
                </ul>
            
            <button onclick="logout()" class="logout-btn">Sair da Conta</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
